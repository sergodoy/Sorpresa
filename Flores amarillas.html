<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Flores Amarillas pa' la Negra! 🌻</title>
    <style>
        :root {
            --color-amarillo: #ffeb3b;
            --brillo-oro: #fbc02d;
            --color-naranja: #f57c00;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            overflow: hidden; text-align: center;
            font-family: 'Montserrat', sans-serif; 
            background: 
                url('https://images.unsplash.com/photo-1549491142-83b5443a6d45?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed, 
                radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            background-size: cover; 
        }

        .stars-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; 
        }

        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.5; animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .content {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; padding: 20px;
        }

        .vibrant-text h1 {
            color: var(--color-amarillo);
            font-size: 2.5rem;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--color-naranja), 0 0 20px var(--color-naranja); 
            animation: pulse-glow 1.5s infinite alternate; 
            margin-bottom: 20px;
        }

        .vibrant-text p {
            color: #fff9c4; font-size: 1.4rem; font-weight: bold;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
            margin: 10px 0;
            line-height: 1.5;
        }

        @keyframes pulse-glow {
            from { text-shadow: 0 0 10px var(--color-naranja), 0 0 20px var(--color-naranja); }
            to { text-shadow: 0 0 20px var(--brillo-oro), 0 0 40px var(--color-amarillo), 0 0 10px #fff; }
        }

        #start-btn {
            padding: 20px 45px; font-size: 1.4rem;
            background: linear-gradient(45deg, #f9a825, #f57c00); 
            color: #fff; border: none; border-radius: 50px;
            font-weight: bold; cursor: pointer;
            box-shadow: 0 0 25px rgba(245, 124, 0, 0.6);
            z-index: 100; transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 35px rgba(245, 124, 0, 0.9);
        }

        .girasol {
            position: absolute; z-index: 5; pointer-events: none;
            filter: drop-shadow(0 0 12px var(--color-amarillo)); 
            /* Se aumentó el tiempo a 6s para que recorran mejor la pantalla */
            animation: galaxy-float 6s linear forwards; 
        }

        @keyframes galaxy-float {
            0% { transform: translate(0, 110vh) rotate(0deg) scale(0); opacity: 0; }
            10% { opacity: 1; transform: translate(var(--side-move), 90vh) scale(1); }
            /* Nueva etapa: Se mantienen 100% visibles (opacity: 1) hasta llegar casi arriba (10vh) */
            85% { opacity: 1; transform: translate(calc(var(--side-move) * 2), 10vh) rotate(360deg) scale(1.6); }
            /* Desaparecen mucho más arriba (-30vh) para que crucen toda la pantalla */
            100% { transform: translate(calc(var(--side-move) * 2.5), -30vh) rotate(480deg) scale(1.8); opacity: 0; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="stars-container" id="starsBox"></div>

    <div id="ui" class="content">
        <button id="start-btn">🌻 ¡Dale cliiiic, Negrita! 🌻🎁</button>
        
        <div id="message" class="hidden vibrant-text">
            <h1>¡Pa' ti habitante de SJL, Ivette! 💛😂</h1>
            <p>¡Sabes que eres mi negra favorita!<br>No te piques, es con cariño.</p>
            <p>¡Eres una amiga increíble y te mereces<br>tus Flores Amarillas! ✨🌻</p>
            <p style="font-style: italic; color: #fdd835 !important; font-size: 1.1rem; margin-top: 20px;">De tu UNICO compañero de rutas, que te quiere<br>(aunque te moleste)! 💛😜</p>
        </div>
    </div>

    <script>
        const starsBox = document.getElementById('starsBox');
        const btn = document.getElementById('start-btn');
        const message = document.getElementById('message');

        function initStars() {
            for (let i = 0; i < 110; i++) { 
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3.5 + 'px'; 
                star.style.width = size; star.style.height = size;
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.setProperty('--duration', Math.random() * 2.5 + 2 + 's'); 
                starsBox.appendChild(star);
            }
        }
        initStars();

        btn.addEventListener('click', () => {
            btn.classList.add('hidden');
            message.classList.remove('hidden');
            
            setInterval(spawnSunflower, 350); 
        });

        function spawnSunflower() {
            const sunflower = document.createElement('div');
            sunflower.className = 'girasol';
            sunflower.innerHTML = '🌻';
            sunflower.style.left = Math.random() * 95 + 'vw';
            sunflower.style.setProperty('--side-move', (Math.random() * 120 - 60) + 'px');
            sunflower.style.fontSize = (Math.random() * 25 + 35) + 'px';
            document.body.appendChild(sunflower);
            
            // Ajustado a 6000ms (6 segundos) para que coincida con la nueva animación de CSS
            setTimeout(() => sunflower.remove(), 6000);
        }
    </script>
</body>
</html>
